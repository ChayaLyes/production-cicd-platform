groups:
  - name: production-alerts
    rules:
      - alert: ServiceDown
        expr: probe_success == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} est DOWN"
          description: "Le service {{ $labels.instance }} ne répond plus depuis 30 secondes"

      - alert: HighLatency
        expr: http_request_duration_seconds_p99 > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Latence élevée sur {{ $labels.job }}"
          description: "La latence p99 dépasse 500ms depuis 1 minute"
