name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
        continue-on-error: true

      - name: Build catalogue image
        run: docker build -t catalogue:latest services/catalogue/

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: catalogue:latest
          severity: HIGH,CRITICAL
          exit-code: 0

  build-push:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push catalogue
        uses: docker/build-push-action@v5
        with:
          context: services/catalogue/
          push: true
          tags: ghcr.io/chayalyes/catalogue:latest

      - name: Build and push panier
        uses: docker/build-push-action@v5
        with:
          context: services/panier/
          push: true
          tags: ghcr.io/chayalyes/panier:latest

      - name: Build and push paiement
        uses: docker/build-push-action@v5
        with:
          context: services/paiement/
          push: true
          tags: ghcr.io/chayalyes/paiement:latest

      - name: Notify Slack
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Pipeline ${{ job.status }} sur production-cicd-platform"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: always()
