apiVersion: apps/v1
kind: Deployment
metadata:
  name: panier
  labels:
    app: panier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: panier
  template:
    metadata:
      labels:
        app: panier
    spec:
      containers:
      - name: panier
        image: ghcr.io/chayalyes/panier:latest
        ports:
        - containerPort: 8001
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: panier-service
spec:
  selector:
    app: panier
  ports:
  - port: 80
    targetPort: 8001
  type: ClusterIP
