apiVersion: apps/v1
kind: Deployment
metadata:
  name: paiement
  labels:
    app: paiement
spec:
  replicas: 2
  selector:
    matchLabels:
      app: paiement
  template:
    metadata:
      labels:
        app: paiement
    spec:
      containers:
      - name: paiement
        image: ghcr.io/chayalyes/paiement:latest
        ports:
        - containerPort: 8002
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: paiement-service
spec:
  selector:
    app: paiement
  ports:
  - port: 80
    targetPort: 8002
  type: ClusterIP
